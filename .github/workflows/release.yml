name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Prepare resource directories
        shell: bash
        run: |
          mkdir -p resources/whisper
          mkdir -p resources/models

      - name: Download whisper.cpp Windows x64 binary
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Fetching latest whisper.cpp release tag..."
          RELEASE_TAG=$(gh release list --repo ggerganov/whisper.cpp --limit 1 --json tagName --jq '.[0].tagName')
          echo "Latest tag: $RELEASE_TAG"

          # List all assets for inspection
          echo "Available assets:"
          gh release view "$RELEASE_TAG" --repo ggerganov/whisper.cpp --json assets --jq '.assets[].name'

          # Pick the plain CPU build (whisper-bin-x64.zip) — NOT blas/cuda variants
          # BLAS build needs libopenblas.dll which isn't bundled and causes silent crash
          ASSET=$(gh release view "$RELEASE_TAG" \
            --repo ggerganov/whisper.cpp \
            --json assets \
            --jq '.assets[] | select(.name == "whisper-bin-x64.zip") | .name' | head -1)

          if [ -z "$ASSET" ]; then
            echo "Fallback: any x64 zip without blas/cuda..."
            ASSET=$(gh release view "$RELEASE_TAG" \
              --repo ggerganov/whisper.cpp \
              --json assets \
              --jq '.assets[] | select(
                (.name | ascii_downcase | test("x64")) and
                (.name | ascii_downcase | test("blas|cuda|cublas|hipblas") | not) and
                (.name | endswith(".zip"))
              ) | .name' | head -1)
          fi

          if [ -z "$ASSET" ]; then
            echo "Fallback: first x64 zip..."
            ASSET=$(gh release view "$RELEASE_TAG" \
              --repo ggerganov/whisper.cpp \
              --json assets \
              --jq '.assets[] | select((.name | ascii_downcase | test("x64")) and (.name | endswith(".zip"))) | .name' | head -1)
          fi

          if [ -z "$ASSET" ]; then
            echo "ERROR: No zip asset found in whisper.cpp release $RELEASE_TAG"
            exit 1
          fi

          echo "Downloading asset: $ASSET"
          gh release download "$RELEASE_TAG" \
            --repo ggerganov/whisper.cpp \
            --pattern "$ASSET" \
            --dir .

          unzip -o "$ASSET" -d whisper-extracted

          echo "Contents of archive:"
          find whisper-extracted -type f

          # Find whisper-cli.exe (preferred) or main.exe (deprecated fallback)
          CLI_EXE=$(find whisper-extracted -name "whisper-cli.exe" | head -1)
          MAIN_EXE=$(find whisper-extracted -name "main.exe" | head -1)

          if [ -n "$CLI_EXE" ]; then
            cp "$CLI_EXE" resources/whisper/whisper-cli.exe
            echo "Copied whisper-cli.exe"
          elif [ -n "$MAIN_EXE" ]; then
            cp "$MAIN_EXE" resources/whisper/main.exe
            echo "Copied main.exe (deprecated fallback)"
          else
            echo "ERROR: No whisper-cli.exe or main.exe found in archive."
            exit 1
          fi

          # Copy all DLLs (required libs)
          find whisper-extracted -name "*.dll" -exec cp {} resources/whisper/ \; 2>/dev/null || true

          echo "Whisper resources:"
          ls resources/whisper/

      - name: Download ggml-base.en model
        shell: bash
        run: |
          echo "Downloading ggml-base.en.bin from HuggingFace..."
          curl -L --retry 3 \
            "https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-base.en.bin" \
            -o resources/models/ggml-base.en.bin
          echo "Model size: $(wc -c < resources/models/ggml-base.en.bin) bytes"

      - name: Install dependencies
        run: npm ci

      - name: Build icons
        shell: bash
        run: node scripts/build-icons.cjs

      - name: Build and package
        run: npm run dist
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist-electron/Voice-Companion-portable.exe
          generate_release_notes: true
